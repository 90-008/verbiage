<div class="page">
    {if @isFile}
    <article class="markdown">{echo @markdown}</article>
    {else}
    <article class="markdown">{echo @markdown}</article>
    <hr>
    <h2>Files</h2>
    <ul>
        {for @currentDir.itemsPresentable item}
        <li>
            <a href="/{put @currentWiki}/w/{put item.pathStripped}">
                {if item.isDirectory}📁{else}📝{end} {put item.name}
            </a>
        </li>
        {end}
    </ul>
    {end}
</div>
<div class="side-panel">
    <div class="side-panel-inner">
        <h4 class="alt-font">Files</h4>
        <ul class="sidebar-file-list">
            {for @currentDir.itemsPresentable item}
            <li class="sidebar-file">
                <a href="/{put @currentWiki}/w/{put item.pathStripped}">
                    {if item.isDirectory}📁{else}📝{end} {put item.name}
                </a>
            </li>
            {end}
        </ul>
    </div>
</div>
