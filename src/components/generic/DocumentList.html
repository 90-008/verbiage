{if self.list.length}
<ul class="document-list">
    {for self.list doc}
    <li class="document-list-item" href="/{echo self.wiki}/w/{echo doc.file.pathStripped}">
        <a class="wraplink" href="/{echo self.wiki}/w/{echo doc.file.pathStripped}"></a>
        <div>
            <a href="/{echo self.wiki}/w/{echo doc.file.pathStripped}" class="document-list-item-title">
                {put doc.features.title}
            </a>
            <a href="/{echo self.wiki}/w/{echo doc.file.pathStripped}" class="document-list-item-filename">
                /{put doc.file.name}
            </a>
            <p class="document-list-item-description">{put doc.features.description}</p>
            <p class="document-list-item-excerpt">{put doc.features.excerpt}</p>
        </div>
    </li>
    {end}
</ul>
{else}
<p>No documents here yet.</p>
{end}
